{% extends "base.html" %}
{% block title %}JFZ Tagger{% endblock %}
{% block nav %}<span style="color:#666">Select a scan directory</span>{% endblock %}
{% block content %}
<h2 style="margin-bottom:16px; font-size:16px;">Scan directories</h2>
<ul style="list-style:none; display:flex; flex-direction:column; gap:8px;">
  {% for sd in scan_dirs %}
  <li>
    <a href="{{ url_for('tag_grid', scan_dir=sd) }}" class="btn">{{ sd }}</a>
    <a href="{{ url_for('browse_grid', scan_dir=sd) }}" class="btn btn-sm" style="margin-left:6px;">Browse</a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
