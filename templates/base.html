<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ archive_name }}{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 14px;
           background: #f0f0f0; color: #222; }
    nav { background: #1a1a1a; color: #fff; padding: 10px 20px;
          display: flex; align-items: center; gap: 20px; }
    nav .brand { font-weight: 700; font-size: 20px; }
    nav a { color: #999; text-decoration: none; font-size: 13px; }
    nav a:hover { color: #fff; }
    nav .sep { color: #444; }
    .content { padding: 20px; max-width: 1600px; margin: 0 auto; }

    .btn { display: inline-flex; align-items: center; padding: 6px 14px;
           border: 1px solid #ccc; border-radius: 5px; background: #fff;
           cursor: pointer; font-size: 13px; text-decoration: none; color: #222;
           font-family: inherit; line-height: 1.4; }
    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-warning { background: #d97706; color: #fff; border-color: #d97706; }
    .btn-warning:hover { background: #b45309; }
    .btn-sm { padding: 4px 10px; font-size: 12px; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px;
             font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
    .badge-pending       { background: #fef3c7; color: #92400e; }
    .badge-reviewed      { background: #d1fae5; color: #065f46; }
    .badge-exported      { background: #dbeafe; color: #1e40af; }
    .badge-uploaded      { background: #ede9fe; color: #5b21b6; }
    .badge-needs_pairing { background: #fee2e2; color: #991b1b; }
    .badge-confidence-high   { background: #d1fae5; color: #065f46; }
    .badge-confidence-medium { background: #fef3c7; color: #92400e; }
    .badge-confidence-low    { background: #fee2e2; color: #991b1b; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="{{ url_for('index') }}" class="brand" style="text-decoration:none; color:inherit;">{{ archive_name }}</a>
  <a href="{{ url_for('envelopes_index') }}" style="color:#999; font-size:13px; text-decoration:none;">Envelopes</a>
  {% block nav %}{% endblock %}
  <span class="sep">|</span>
  <span style="color:#999; font-size:12px;"
        title="{{ llm_usage.calls }} LLM call(s) — {{ '{:,}'.format(llm_usage.input_tokens) }} in / {{ '{:,}'.format(llm_usage.output_tokens) }} out tokens (est. cost)">
    LLM: {{ '{:,}'.format(llm_usage.input_tokens + llm_usage.output_tokens) }} tok (~${{ '%.2f'|format(llm_usage.cost_usd) }})
  </span>
  {% if safe_mode %}
  <span style="margin-left:auto; background:#7c3aed; color:#fff; font-size:11px;
               font-weight:700; padding:3px 10px; border-radius:10px; letter-spacing:.5px;">
    SAFE MODE
  </span>
  {% endif %}
</nav>
<div class="content">
  {% block content %}{% endblock %}
</div>
</body>
</html>
